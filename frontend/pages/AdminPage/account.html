<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Tài Khoản - Admin</title>
    <meta name="description"
        content="Trang quản trị quản lý tài khoản người dùng và phân quyền thành viên của LAPTECH.">
    <meta property="og:title" content="Quản Lý Tài Khoản - Admin">
    <meta property="og:description"
        content="Trang quản trị quản lý tài khoản người dùng và phân quyền thành viên của LAPTECH.">
    <link rel="stylesheet" href="./css/admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <!-- SIDEBAR -->
    <div id="sidebar-placeholder" class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <!-- NAVBAR -->
        <div class="navbar">

            <h1>Quản Lý Tài Khoản</h1>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Tìm Kiếm...">
            </div>

            <div class="user">
                👤 ADMIN
            </div>

        </div>

        <!-- CONTENT -->
        <div class="content-wrapper">

            <!-- MAIN CONTENT -->
            <div class="content">

                <div class="breadcrumb">
                    Tài Khoản / Danh sách
                </div>

                <!-- FILTER & ACTIONS -->
                <div class="filter-row"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">

                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label>Bộ lọc vai trò:</label>
                        <select id="filter-role"
                            style="padding: 6px 12px; border-radius: 4px; border: 1px solid #ddd; background: #fff; font-size: 14px; cursor: pointer;">
                            <option value="">Tất cả vai trò</option>
                            <option value="IT">IT</option>
                            <option value="MANAGER">MANAGER</option>
                            <option value="STAFF">STAFF</option>
                            <option value="STORAGE">STORAGE</option>
                            <option value="ACCOUNTING">ACCOUNTING</option>
                            <option value="CUSTOMER">CUSTOMER</option>
                        </select>
                    </div>

                    <button id="btn-add-user"
                        style="background-color: #1e3a8a; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 14px; transition: all 0.2s ease;">
                        <i class="fa-solid fa-user-plus"></i> Thêm người dùng mới
                    </button>

                </div>

                <!-- TABLE -->
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">

                    <thead>
                        <tr>
                            <th>Họ và Tên</th>
                            <th>Số Điện Thoại</th>
                            <th>Email</th>
                            <th>Vai Trò</th>
                            <th>Tỉnh / Thành</th>
                            <th>Trạng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>

                    <tbody id="user-table-body">
                        <!-- Sẽ tự động tải qua API account.js -->
                    </tbody>

                </table>

                <!-- PAGINATION -->
                <div class="pagination" id="user-pagination"
                    style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 20px;">
                    <!-- Nút phân trang được thêm động bằng javascript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../utils/constants.js"></script>
    <script src="./js/sidebar.js"></script>
    <script src="./js/account.js"></script>
</body>

</html>
